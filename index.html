<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>BSF Feeding Guide - Best Formula</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #f9f9f9; font-family: Arial, sans-serif; }
    .container { margin-top: 50px; }
    .result-table th, .result-table td { text-align: center; }
    .feed-type { font-weight: bold; color: white; padding: 5px; border-radius: 5px; }
    .mash { background-color: #28a745; } /* Green for mash */
    .manure { background-color: #795548; } /* Brown for manure */
    .water { color: #007bff; font-weight: bold; }
    .day0-card { background: #fff3cd; border: 1px solid #ffeeba; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
    .stop-feed { background-color: #6c757d; color: white; font-weight: bold; }
    @media print {
      .btn, input { display: none; }
      table { page-break-inside: auto; }
      tr { page-break-inside: avoid; page-break-after: auto; }
    }
  </style>
</head>
<body>
<div class="container">
  <h2 class="text-center mb-4">BSF Feeding Guide</h2>

  <div class="card p-4 mb-4">
    <div class="form-group">
      <label>Grams of BSF eggs:</label>
      <input type="number" id="eggGrams" class="form-control" placeholder="e.g., 10" min="1">
    </div>
    <div class="form-group">
      <label>Current Larvae Age (DOL):</label>
      <input type="number" id="currentDOL" class="form-control" placeholder="e.g., 0" min="0">
    </div>
    <button id="generate" class="btn btn-primary btn-block">Generate Feeding Plan</button>
  </div>

  <!-- Day 0 Prep -->
  <div id="day0-prep" class="day0-card text-center" style="display:none;">
    <h5>Day 0 Prep (Pre-hatching)</h5>
    <p id="day0-text"></p>
  </div>

  <div id="plan" class="mt-4">
    <h4>Daily Feeding Schedule</h4>
    <table class="table table-bordered result-table">
      <thead class="thead-dark">
        <tr>
          <th>DOL</th>
          <th>Feed Type</th>
          <th>Feed (grams)</th>
          <th>Water (ml)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  const feedGuide = (eggGrams, currentDOL) => {
    const tableRows = [];
    const stopDOL = 28; // stop feeding at DOL 28

    // Best formulas per DOL range (per 1g eggs)
    const feedingRates = [
      {days: [0,2], feed: 20, water: 40, type: "Chicken Mash", class: "mash"},
      {days: [3,5], feed: 40, water: 80, type: "Chicken Mash", class: "mash"},
      {days: [6,8], feed: 70, water: 140, type: "Chicken Mash", class: "mash"},
      {days: [9,10], feed: 90, water: 180, type: "Chicken Mash", class: "mash"},
      {days: [11,15], feed: 120, water: 180, type: "Chicken Manure", class: "manure"},
      {days: [16,20], feed: 150, water: 225, type: "Chicken Manure", class: "manure"},
      {days: [21,25], feed: 180, water: 270, type: "Chicken Manure", class: "manure"},
      {days: [26,stopDOL], feed: 200, water: 300, type: "Chicken Manure", class: "manure"}
    ];

    for(let day = currentDOL; day <= stopDOL; day++){
      let feedAmount = 0;
      let waterAmount = 0;
      let feedType = "";
      let feedClass = "";

      // Select the correct feeding rate
      for(const rate of feedingRates){
        if(day >= rate.days[0] && day <= rate.days[1]){
          feedAmount = rate.feed * eggGrams;
          waterAmount = rate.water * eggGrams;
          feedType = rate.type;
          feedClass = rate.class;
          break;
        }
      }

      tableRows.push(`<tr>
        <td>${day}</td>
        <td class="feed-type ${feedClass}">${feedType}</td>
        <td>${feedAmount}</td>
        <td class="water">${waterAmount}</td>
      </tr>`);
    }

    // Add Stop Feeding / Pupation row
    tableRows.push(`<tr>
      <td>${stopDOL + 1}</td>
      <td class="stop-feed" colspan="3">Stop Feeding / Pupation</td>
    </tr>`);

    return tableRows.join('');
  };

  $('#generate').click(function(){
    const eggs = parseFloat($('#eggGrams').val());
    const dol = parseInt($('#currentDOL').val());

    if(isNaN(eggs) || eggs <= 0 || isNaN(dol) || dol < 0){
      alert("Please enter valid egg grams and DOL");
      return;
    }

    // Day 0 prep (pre-hatching)
    const day0Feed = 20 * eggs;
    const day0Water = 40 * eggs;
    $('#day0-text').html(`Prep thin chicken mash porridge: <strong>${day0Feed} g chicken mash</strong> + <strong>${day0Water} ml water</strong> per ${eggs} g eggs.<br>Spread thinly in tray for newly hatched larvae.`);
    $('#day0-prep').show();

    // Generate feeding table
    const rows = feedGuide(eggs, dol);
    $('#plan tbody').html(rows);
  });
</script>
</body>
</html>
