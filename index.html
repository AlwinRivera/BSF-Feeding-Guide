<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>BSF Feeding Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body { background: #f9f9f9; font-family: Arial, sans-serif; }
    .container { margin-top: 40px; }
    .result-table th, .result-table td { text-align: center; }
    .feed-type { font-weight: bold; color: white; padding: 5px; border-radius: 5px; }
    .mash { background-color: #28a745; }
    .transition { background-color: #ffc107; color: black; }
    .manure { background-color: #795548; }
    .water { color: #007bff; font-weight: bold; }
    .summary { background: #e9ecef; padding: 15px; border-radius: 5px; margin-top: 20px; }
  </style>
</head>

<body>
<div class="container">
  <h2 class="text-center mb-4">BSF Feeding Guide</h2>

  <div class="card p-4 mb-4">
    <div class="form-group">
      <label>Grams of BSF eggs:</label>
      <input type="number" id="eggGrams" class="form-control" placeholder="e.g., 15000" min="1">
    </div>

    <div class="form-group">
      <label>Current Larvae Age (DOL):</label>
      <input type="number" id="currentDOL" class="form-control" placeholder="e.g., 0" min="0">
    </div>

    <!-- ✅ NEW TOGGLE -->
    <div class="form-group form-check">
      <input type="checkbox" class="form-check-input" id="useManure" checked>
      <label class="form-check-label">
        Use Chicken Manure (toggle OFF = mash only system)
      </label>
    </div>

    <button id="generate" class="btn btn-primary btn-block">
      Generate Feeding Plan
    </button>
  </div>

  <div id="plan" class="mt-4">
    <h4>Daily Feeding Schedule</h4>
    <table class="table table-bordered result-table">
      <thead class="thead-dark">
        <tr>
          <th>DOL</th>
          <th>Feed Type</th>
          <th>Feed</th>
          <th>Water</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="summary" class="summary" style="display:none;"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
const feedGuide = (eggGrams, currentDOL, useManure) => {
  const tableRows = [];
  let totalMash = 0;
  let totalManure = 0;

  for(let day = currentDOL; day <= 28; day++){
    let feedPerGram = 0;
    let feedType = "";
    let feedClass = "";

    // ✅ IF MANURE IS DISABLED → FULL MASH SYSTEM
    if(!useManure){
      const mashCurveFull = [
        0.7, 1.5, 3, 5, 7, 9, 11, 13, 15, 16,
        17, 18, 19, 19, 18, 17, 15, 13, 11, 9,
        8, 7, 6, 5, 4.5, 4, 3.5, 3, 3
      ];

      feedPerGram = mashCurveFull[day] || 3;
      totalMash += feedPerGram * eggGrams;

      feedType = "Chicken Mash Only";
      feedClass = "mash";
    }

    // ✅ NORMAL SYSTEM (WITH MANURE)
    else {

      // PHASE 1: MASH
      if(day <= 4){
        const mashCurve = [0.7, 1.5, 3, 5, 7];
        feedPerGram = mashCurve[day];
        totalMash += feedPerGram * eggGrams;
        feedType = "Chicken Mash";
        feedClass = "mash";
      }

      // PHASE 2: TRANSITION
      else if(day === 5){
        feedPerGram = 6;
        totalMash += (feedPerGram * 0.6) * eggGrams;
        totalManure += (feedPerGram * 0.4) * eggGrams;
        feedType = "60% Mash + 40% Manure";
        feedClass = "transition";
      }
      else if(day === 6){
        feedPerGram = 7;
        totalMash += (feedPerGram * 0.3) * eggGrams;
        totalManure += (feedPerGram * 0.7) * eggGrams;
        feedType = "30% Mash + 70% Manure";
        feedClass = "transition";
      }

      // PHASE 3: MANURE
      else {
        const manureCurve = [
          7, 8, 9, 10, 11, 12, 13, 13, 12, 11,
          10, 9, 8, 7, 6, 5.5, 5, 4.5, 4, 3.5, 3
        ];
        let idx = day - 7;
        feedPerGram = manureCurve[idx] || 3;

        totalManure += feedPerGram * eggGrams;
        feedType = "Chicken Manure";
        feedClass = "manure";
      }
    }

    // WATER
    let waterRatio = 0.8;
    let feedAmount = feedPerGram * eggGrams;
    let waterAmount = feedAmount * waterRatio;

    let feedDisplay = eggGrams < 1000 
      ? feedAmount.toFixed(2) + ' g' 
      : (feedAmount / 1000).toFixed(2) + ' kg';

    let waterDisplay = eggGrams < 1000 
      ? waterAmount.toFixed(2) + ' ml' 
      : (waterAmount / 1000).toFixed(2) + ' L';

    tableRows.push(`
      <tr>
        <td>${day}</td>
        <td class="feed-type ${feedClass}">${feedType}</td>
        <td>${feedDisplay}</td>
        <td class="water">${waterDisplay}</td>
      </tr>
    `);
  }

  let totalMashDisplay = eggGrams < 1000 
    ? totalMash.toFixed(2) + ' g' 
    : (totalMash / 1000).toFixed(2) + ' kg';

  let totalManureDisplay = eggGrams < 1000 
    ? totalManure.toFixed(2) + ' g' 
    : (totalManure / 1000).toFixed(2) + ' kg';

  return {
    rows: tableRows.join(''),
    totalMashDisplay,
    totalManureDisplay
  };
};

$('#generate').click(function(){
  const eggs = parseFloat($('#eggGrams').val());
  const dol = parseInt($('#currentDOL').val());
  const useManure = $('#useManure').is(':checked');

  if(isNaN(eggs) || eggs <= 0 || isNaN(dol) || dol < 0){
    alert("Please enter valid egg grams and DOL");
    return;
  }

  const result = feedGuide(eggs, dol, useManure);
  $('#plan tbody').html(result.rows);

  $('#summary').html(`
    <strong>Total Mash:</strong> ${result.totalMashDisplay}<br>
    <strong>Total Manure:</strong> ${useManure ? result.totalManureDisplay : "0"}<br><br>

    <strong>System:</strong> ${useManure ? "Mash → Manure Integrated" : "100% Mash System"}<br>
    <strong>Feeding Model:</strong> Industrial high-density<br>
    <strong>Mode:</strong> ${useManure ? "Cost-optimized (waste-fed)" : "High-growth (premium feed)"}
  `).show();
});
</script>
</body>
</html>
